version: "3.9"

services:

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"          # HTTP/WS
      - "7881:7881/tcp"      # RTC TCP
      - "50000-50100:50000-50100/udp"  # RTC UDP range
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml
    networks:
      - voiceagent

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=ws://livekit:7880
    depends_on:
      - livekit
    networks:
      - voiceagent

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: voice-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=ws://livekit:7880
    depends_on:
      - livekit
    networks:
      - voiceagent

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - livekit
    networks:
      - voiceagent

networks:
  voiceagent:
    driver: bridge
